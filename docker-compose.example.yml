version: '3.8'

services:
  royalwings:
    image: ghcr.io/royalwings/royalwings:latest
    restart: always
    networks:
      - royalwings0
    ports:
      - "8080:8080"
      - "2022:2022"
    tty: true
    environment:
      TZ: "UTC"
      WINGS_UID: 988
      WINGS_GID: 988
      WINGS_USERNAME: royalwings
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/var/lib/docker/containers/:/var/lib/docker/containers/"
      - "/etc/royalwings/:/etc/royalwings/"
      - "/var/lib/royalwings/:/var/lib/royalwings/"
      - "/var/log/royalwings/:/var/log/royalwings/"
      - "/tmp/royalwings/:/tmp/royalwings/"
      - "/etc/ssl/certs:/etc/ssl/certs:ro"
      - "/run/royalwings:/run/royalwings"
      # you may need /var/lib/pterodactyl if you are upgrading from an pterodactyl agent
      - "/var/lib/pterodactyl/:/var/lib/pterodactyl/"
      # you may need /srv/daemon-data if you are upgrading from an old daemon
      #- "/srv/daemon-data/:/srv/daemon-data/"
      # Required for ssl if you use let's encrypt. uncomment to use.
      #- "/etc/letsencrypt/:/etc/letsencrypt/"

networks:
  royalwings0:
    name: royalwings0
    driver: bridge
    ipam:
      config:
        - subnet: "172.21.0.0/16"
    driver_opts:
      com.docker.network.bridge.name: royalwings0
